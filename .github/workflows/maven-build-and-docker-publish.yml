name: Maven build and Docker publish

on:
  push:
    branches:
    - main

jobs:
  maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        cache: 'maven'
    
    - name: Build with Maven
      run: ./mvnw package 

    - name: Upload artifact for Docker job
      uses: actions/upload-artifact@v4
      with:
        name: java-app
        path: '${{ github.workspace }}/target/*.jar'

  build:
    name: "Build with docker"
    
    runs-on: ubuntu-latest
    needs: maven

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code # Required for the DockerFile
        uses: actions/checkout@v4

      - name: Download artifact from maven job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target/
      
      - name: Logging in to Docker
        run: docker login ghcr.io -u adaz008 -p ${{ github.token }}

      - name: Build the Docker image
        run: docker build . -t ghcr.io/adaz008/cubix/1/homework/app:springboot

      - name: Publishing the Docker image
        run: docker push ghcr.io/adaz008/cubix/1/homework/app:springboot
